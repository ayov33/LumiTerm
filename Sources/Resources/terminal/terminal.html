<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="xterm.css">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: rgba(20, 20, 22, 0.60);
    overflow: hidden;
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    transition: background 0.35s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* Tab bar */
  #tab-bar {
    height: 31px;
    max-height: 31px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
    opacity: 1;
    transition: max-height 0.2s cubic-bezier(0.25, 1, 0.5, 1),
                opacity 0.15s cubic-bezier(0.25, 1, 0.5, 1),
                border-color 0.15s ease;
  }
  #tab-bar.hidden {
    max-height: 0;
    opacity: 0;
    border-bottom-color: transparent;
    padding-top: 0;
    padding-bottom: 0;
  }
  .tab-btn {
    padding: 0 8px 0 14px;
    border-radius: 11px;
    border: none;
    height: 22px;
    font-size: 10px;
    font-family: 'SF Mono', Menlo, monospace;
    font-weight: 500;
    cursor: pointer;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.1);
    outline: none;
    min-width: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    gap: 6px;
    transition: color 0.15s ease, background 0.15s ease, transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .tab-btn:hover {
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.15);
  }
  .tab-btn:active {
    transform: scale(0.95);
  }
  .tab-btn.active {
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.2);
  }
  .tab-close {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    flex-shrink: 0;
  }
  .tab-close:hover {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
  }
  .tab-close:active {
    transform: scale(0.85);
  }
  .tab-btn.active .tab-close {
    display: flex;
  }
  .tab-btn[contenteditable="true"] {
    cursor: text;
    outline: none;
    min-width: 40px;
  }
  #rename-input {
    position: absolute;
    height: 22px;
    border-radius: 11px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.95);
    font-size: 10px;
    font-family: 'SF Mono', Menlo, monospace;
    font-weight: 500;
    text-align: center;
    padding: 0 8px;
    outline: none;
    display: none;
    z-index: 10;
    box-sizing: border-box;
  }
  #add-btn {
    padding: 0 12px;
    border-radius: 11px;
    border: none;
    height: 22px;
    font-size: 12px;
    font-weight: 300;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.1);
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: color 0.15s ease, background 0.15s ease, transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
  }
  #add-btn:hover {
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.15);
  }
  #add-btn:active {
    transform: scale(0.9);
  }
  #tab-logo {
    margin-left: auto;
    width: 14px;
    height: 14px;
    opacity: 0.35;
    flex-shrink: 0;
  }

  /* Terminal area */
  #terminals {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 0;
  }
  .term-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 10px;
    box-sizing: border-box;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.12s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .term-container.active {
    opacity: 1;
    visibility: visible;
  }
  .xterm { background: transparent !important; }
  .xterm-viewport {
    background: transparent !important;
    overflow-y: hidden !important;
  }
  .xterm-screen { background: transparent !important; }
  .xterm-viewport::-webkit-scrollbar { width: 0; height: 0; }

  /* ─── Cursor Glow ─── */
  .cursor-glow {
    position: absolute;
    top: 0;
    left: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    filter: blur(10px);
    will-change: transform, opacity;
  }

  /* ─── Progress Light Strip ─── */
  #progress-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    z-index: 20;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.35s cubic-bezier(0.25, 1, 0.5, 1);
  }
  #progress-strip.active {
    opacity: 1;
  }
  #progress-strip-inner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, #7CAFC2, #BF5AF2, transparent);
    animation: strip-flow 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }
  @keyframes strip-flow {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  @media (prefers-reduced-motion: reduce) {
    .cursor-glow { display: none; }
    #progress-strip-inner { animation: none; opacity: 0.6; transform: none; }
  }
</style>
</head>
<body>

<div id="tab-bar" class="hidden">
  <input id="rename-input" type="text" maxlength="20">
  <div id="add-btn">+</div>
  <svg id="tab-logo" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg-v" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
      <linearGradient id="lg-h" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset="1" stop-color="#fff"/></linearGradient>
    </defs>
    <rect x="24" y="24" width="17" height="47" fill="url(#lg-v)"/>
    <rect x="24" y="54" width="47" height="17" fill="url(#lg-h)"/>
  </svg>
</div>
<div id="terminals"></div>
<div id="progress-strip"><div id="progress-strip-inner"></div></div>

<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script>
(function() {
  var MAX_TABS = 5;
  var MAX_TITLE_LEN = 20;
  var tabs = {};
  var tabOrder = [];
  var activeTabId = null;
  var nextId = 1;
  var defaultTitle = '';  // Set by Swift (Claude Code version)

  var THEMES = {
    'default': {
      background: 'transparent', foreground: '#D8D8D8', cursor: '#7CAFC2', cursorAccent: 'transparent',
      selectionBackground: 'rgba(108, 126, 230, 0.3)', selectionForeground: '#F7F8F8',
      black: '#000000', red: '#FF453A', green: '#30D158', yellow: '#FF9F0A',
      blue: '#0A84FF', magenta: '#BF5AF2', cyan: '#7CAFC2', white: '#D8D8D8',
      brightBlack: '#666666', brightRed: '#FF6961', brightGreen: '#4CD964',
      brightYellow: '#FFD60A', brightBlue: '#64D2FF', brightMagenta: '#DA8FFF',
      brightCyan: '#A8D8EA', brightWhite: '#F7F8F8'
    },
    tokyoNight: {
      background: 'transparent', foreground: '#a9b1d6', cursor: '#7aa2f7', cursorAccent: 'transparent',
      selectionBackground: 'rgba(40, 44, 70, 0.6)', selectionForeground: '#c0caf5',
      black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
      blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
      brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
      brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
      brightCyan: '#7dcfff', brightWhite: '#c0caf5'
    },
    catppuccin: {
      background: 'transparent', foreground: '#cdd6f4', cursor: '#f5e0dc', cursorAccent: 'transparent',
      selectionBackground: 'rgba(88, 91, 112, 0.5)', selectionForeground: '#cdd6f4',
      black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
      blue: '#89b4fa', magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
      brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1',
      brightYellow: '#f9e2af', brightBlue: '#89b4fa', brightMagenta: '#cba6f7',
      brightCyan: '#94e2d5', brightWhite: '#a6adc8'
    }
  };

  var THEME_BACKGROUNDS = {
    'default':    'rgba(20, 20, 22, ',
    tokyoNight:   'rgba(26, 27, 38, ',
    catppuccin:   'rgba(30, 30, 46, '
  };

  var currentThemeName = 'default';
  var currentOpacity = 0.60; // sync with Theme.defaultOpacity

  var termConfig = {
    fontFamily: 'Menlo, "SF Mono", Monaco, monospace',
    fontSize: 13,
    lineHeight: 1.2,
    cursorStyle: 'bar',
    cursorBlink: false,
    allowTransparency: true,
    theme: THEMES['default'],
    scrollback: 5000,
    macOptionIsMeta: true,
    macOptionClickForcesSelection: true,
    allowProposedApi: true
  };

  function postToSwift(action, data) {
    if (window.webkit && window.webkit.messageHandlers.terminal) {
      window.webkit.messageHandlers.terminal.postMessage(
        Object.assign({ action: action }, data || {})
      );
    }
  }

  function stringToBase64(str) {
    var bytes = new TextEncoder().encode(str);
    var binary = '';
    for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  function getDisplayTitle(tab) {
    return tab.customTitle || defaultTitle || ('Tab ' + tab.id);
  }

  function refreshTabBar() {
    // Always hide rename input when rebuilding tab bar
    if (!renamingTabId) {
      document.getElementById('rename-input').style.display = 'none';
    }

    var bar = document.getElementById('tab-bar');

    // Animate tab bar show/hide
    if (tabOrder.length <= 1) {
      bar.classList.add('hidden');
    } else {
      bar.classList.remove('hidden');
    }

    var oldBtns = bar.querySelectorAll('.tab-btn');
    for (var i = 0; i < oldBtns.length; i++) oldBtns[i].remove();

    var addBtn = document.getElementById('add-btn');
    for (var i = 0; i < tabOrder.length; i++) {
      var id = tabOrder[i];
      var tab = tabs[id];
      var btn = document.createElement('div');
      btn.className = 'tab-btn' + (id === activeTabId ? ' active' : '');
      btn.dataset.tabId = id;

      // Tab title span
      var titleSpan = document.createElement('span');
      titleSpan.textContent = getDisplayTitle(tab);
      btn.appendChild(titleSpan);

      // Close button (visible only on active tab via CSS)
      var closeBtn = document.createElement('span');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '\u00d7';
      closeBtn.addEventListener('click', (function(tabId) {
        return function(e) {
          e.stopPropagation();
          if (tabOrder.length > 1) {
            termManager.closeTab(tabId);
          }
        };
      })(id));
      btn.appendChild(closeBtn);

      // Single click → switch tab
      btn.addEventListener('click', (function(tabId) {
        return function(e) {
          termManager.switchTab(tabId);
        };
      })(id));

      // Double click → rename
      btn.addEventListener('dblclick', (function(tabId, btnEl) {
        return function(e) {
          e.preventDefault();
          startRename(tabId, btnEl);
        };
      })(id, btn));

      bar.insertBefore(btn, addBtn);
    }
    addBtn.style.display = tabOrder.length >= MAX_TABS ? 'none' : '';

    // Refit active terminal after tab bar show/hide changes height
    requestAnimationFrame(function() {
      if (activeTabId && tabs[activeTabId]) {
        tabs[activeTabId].fitAddon.fit();
      }
    });
  }

  var renamingTabId = null;
  var renamingBtnEl = null;

  function startRename(tabId, btnEl) {
    var tab = tabs[tabId];
    if (!tab) return;
    renamingTabId = tabId;
    renamingBtnEl = btnEl;

    // Hide the pill text
    btnEl.style.color = 'transparent';

    var input = document.getElementById('rename-input');
    var rect = btnEl.getBoundingClientRect();
    input.style.left = rect.left + 'px';
    input.style.top = rect.top + 'px';
    input.style.width = rect.width + 'px';
    input.style.height = rect.height + 'px';
    input.style.display = 'block';
    input.value = getDisplayTitle(tab);
    input.focus();
    input.select();
  }

  // Rename input handlers
  (function() {
    var input = document.getElementById('rename-input');
    var finishing = false;

    function finishRename(save) {
      if (finishing || !renamingTabId) return;
      finishing = true;
      var tab = tabs[renamingTabId];
      if (tab && save) {
        var val = input.value.trim().substring(0, MAX_TITLE_LEN);
        tab.customTitle = val || null;
      }
      // Restore pill text
      if (renamingBtnEl) {
        renamingBtnEl.style.color = '';
        renamingBtnEl = null;
      }
      input.style.display = 'none';
      renamingTabId = null;
      finishing = false;
      refreshTabBar();
      if (activeTabId && tabs[activeTabId]) tabs[activeTabId].term.focus();
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); finishRename(true); }
      else if (e.key === 'Escape') { e.preventDefault(); finishRename(false); }
    });
    input.addEventListener('blur', function() { finishRename(true); });
  })();

  // Add button click
  document.getElementById('add-btn').addEventListener('click', function() {
    termManager.createTab();
  });

  window.termManager = {
    createTab: function() {
      if (tabOrder.length >= MAX_TABS) return null;

      var id = String(nextId++);
      var container = document.createElement('div');
      container.className = 'term-container';
      container.id = 'term-' + id;
      document.getElementById('terminals').appendChild(container);

      var term = new Terminal(termConfig);
      var fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);

      term.onData(function(data) {
        postToSwift('data', { tabId: id, data: stringToBase64(data) });
      });
      term.onBinary(function(data) {
        postToSwift('data', { tabId: id, data: btoa(data) });
      });
      term.onResize(function(size) {
        postToSwift('resize', { tabId: id, cols: size.cols, rows: size.rows });
      });
      term.onBell(function() {
        postToSwift('bell', { tabId: id });
      });

      // Cursor glow element
      var glowEl = document.createElement('div');
      glowEl.className = 'cursor-glow';
      glowEl.style.background = GLOW_COLORS[currentThemeName] || '#7CAFC2';
      container.appendChild(glowEl);

      tabs[id] = { id: id, term: term, fitAddon: fitAddon, containerEl: container, customTitle: null, glowEl: glowEl };
      tabOrder.push(id);

      // Pulse glow on user typing
      term.onData(function() {
        glowPulse(id);
      });
      // Track cursor position for glow
      term.onCursorMove(function() {
        glowUpdatePos(id);
      });

      this.switchTab(id);
      postToSwift('tabCreated', { tabId: id });
      return id;
    },

    closeTab: function(id) {
      if (!tabs[id]) return;
      if (tabOrder.length <= 1) return;

      tabs[id].term.dispose();
      tabs[id].containerEl.remove();
      delete tabs[id];
      tabOrder = tabOrder.filter(function(tid) { return tid !== id; });

      if (activeTabId === id) {
        this.switchTab(tabOrder[tabOrder.length - 1]);
      } else {
        refreshTabBar();
      }
      postToSwift('tabClosed', { tabId: id });
    },

    switchTab: function(id) {
      if (!tabs[id]) return;
      if (id === activeTabId) return;  // Already active, don't refresh

      for (var i = 0; i < tabOrder.length; i++) {
        tabs[tabOrder[i]].containerEl.classList.remove('active');
      }

      activeTabId = id;
      tabs[id].containerEl.classList.add('active');

      requestAnimationFrame(function() {
        tabs[id].fitAddon.fit();
        tabs[id].term.focus();
      });

      refreshTabBar();
      postToSwift('tabSwitched', { tabId: id });
    },

    writeBase64: function(tabId, b64) {
      if (!tabs[tabId]) return;
      try {
        var binary = atob(b64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        tabs[tabId].term.write(bytes);
      } catch(e) {}
    },

    fitActive: function() {
      if (activeTabId && tabs[activeTabId]) {
        tabs[activeTabId].fitAddon.fit();
      }
    },

    setDefaultTitle: function(title) {
      defaultTitle = title;
      refreshTabBar();
    },

    setFontSize: function(size) {
      var ids = Object.keys(tabs);
      for (var i = 0; i < ids.length; i++) {
        tabs[ids[i]].term.options.fontSize = size;
        if (ids[i] === activeTabId) {
          tabs[ids[i]].fitAddon.fit();
        }
      }
    },

    setBackgroundOpacity: function(opacity) {
      currentOpacity = opacity;
      var prefix = THEME_BACKGROUNDS[currentThemeName] || THEME_BACKGROUNDS['default'];
      document.body.style.background = prefix + opacity + ')';
    },

    setTheme: function(name) {
      if (!THEMES[name]) return;
      currentThemeName = name;
      // Update termConfig for new tabs
      termConfig.theme = THEMES[name];
      // Update all existing terminal instances
      var ids = Object.keys(tabs);
      for (var i = 0; i < ids.length; i++) {
        tabs[ids[i]].term.options.theme = THEMES[name];
      }
      // Update body background with current opacity
      var prefix = THEME_BACKGROUNDS[name] || THEME_BACKGROUNDS['default'];
      document.body.style.background = prefix + currentOpacity + ')';
    },

    getActiveTabId: function() {
      return activeTabId;
    },

    getTabCount: function() {
      return tabOrder.length;
    },

    switchToIndex: function(index) {
      if (index >= 0 && index < tabOrder.length) {
        this.switchTab(tabOrder[index]);
      }
    },

    fitAll: function() {
      for (var i = 0; i < tabOrder.length; i++) {
        var t = tabs[tabOrder[i]];
        if (t && t.fitAddon) { try { t.fitAddon.fit(); } catch(e) {} }
      }
    },

    // Called by Swift on first expand
    ready: function() {
      if (tabOrder.length === 0) {
        this.createTab();
      } else {
        this.fitActive();
      }
    }
  };

  // Auto-fit on resize
  new ResizeObserver(function() {
    if (activeTabId && tabs[activeTabId]) {
      try { tabs[activeTabId].fitAddon.fit(); } catch(e) {}
    }
  }).observe(document.getElementById('terminals'));

  // ─── Cursor Glow Engine ───

  var GLOW_COLORS = {
    'default': '#7CAFC2', tokyoNight: '#7aa2f7', catppuccin: '#89b4fa'
  };
  var STRIP_GRADS = {
    'default':    'linear-gradient(90deg, transparent, #7CAFC2, #BF5AF2, transparent)',
    tokyoNight:   'linear-gradient(90deg, transparent, #7aa2f7, #bb9af7, transparent)',
    catppuccin:   'linear-gradient(90deg, transparent, #89b4fa, #cba6f7, transparent)'
  };

  var glowLevel = 0;
  var glowDecayRAF = null;

  function glowGetCell(term) {
    try { return term._core._renderService.dimensions.css.cell; } catch(e) {}
    var fs = term.options.fontSize || 13;
    return { width: fs * 0.6, height: fs * (term.options.lineHeight || 1.2) };
  }

  function glowUpdatePos(tabId) {
    var tab = tabs[tabId];
    if (!tab || !tab.glowEl) return;
    var buf = tab.term.buffer.active;
    var cell = glowGetCell(tab.term);
    var px = 10 + (buf.cursorX + 0.5) * cell.width;
    var py = 10 + (buf.cursorY + 0.5) * cell.height;
    tab.glowEl.style.transform = 'translate(-50%, -50%) translate(' + px + 'px,' + py + 'px)';
  }

  function glowApply() {
    if (!activeTabId || !tabs[activeTabId] || !tabs[activeTabId].glowEl) return;
    var el = tabs[activeTabId].glowEl;
    el.style.opacity = (0.12 + 0.28 * glowLevel).toFixed(3);
    var size = 20 + 14 * glowLevel;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
  }

  function glowPulse(tabId) {
    glowLevel = Math.min(1.0, glowLevel + 0.4);
    glowApply();
    glowUpdatePos(tabId);
    if (!glowDecayRAF) glowDecayRAF = requestAnimationFrame(glowDecay);
  }

  function glowDecay() {
    glowDecayRAF = null;
    glowLevel = Math.max(0, glowLevel - 0.012);
    glowApply();
    if (glowLevel > 0.001) {
      glowDecayRAF = requestAnimationFrame(glowDecay);
    } else {
      glowLevel = 0;
      if (activeTabId && tabs[activeTabId] && tabs[activeTabId].glowEl) {
        tabs[activeTabId].glowEl.style.opacity = '0';
      }
    }
  }

  function glowUpdateAllColors() {
    var color = GLOW_COLORS[currentThemeName] || GLOW_COLORS['default'];
    var ids = Object.keys(tabs);
    for (var i = 0; i < ids.length; i++) {
      if (tabs[ids[i]].glowEl) tabs[ids[i]].glowEl.style.background = color;
    }
    var grad = STRIP_GRADS[currentThemeName] || STRIP_GRADS['default'];
    document.getElementById('progress-strip-inner').style.background = grad;
  }

  // ─── Progress Strip ───

  var stripEl = document.getElementById('progress-strip');
  var stripOutputBytes = 0;
  var stripIdleTimer = null;
  var stripJsActive = false;
  var stripSwiftActive = false;

  function stripUpdate() {
    if (stripSwiftActive || stripJsActive) {
      stripEl.classList.add('active');
    } else {
      stripEl.classList.remove('active');
    }
  }

  // ─── Extend termManager (no monkey-patching) ───

  // setRunning: called from Swift OutputMonitor
  window.termManager.setRunning = function(isRunning) {
    stripSwiftActive = isRunning;
    stripUpdate();
  };

  // Wrap writeBase64 to add glow + strip tracking
  var _origWriteBase64 = window.termManager.writeBase64.bind(window.termManager);
  window.termManager.writeBase64 = function(tabId, b64) {
    _origWriteBase64(tabId, b64);

    // Subtle glow on PTY output
    if (tabId === activeTabId && glowLevel < 0.15) {
      glowLevel = 0.15;
      glowApply();
      if (!glowDecayRAF) glowDecayRAF = requestAnimationFrame(glowDecay);
    }

    // JS-side strip detection
    stripOutputBytes += b64.length;
    if (stripOutputBytes > 500 && !stripJsActive) {
      stripJsActive = true;
      stripUpdate();
    }
    clearTimeout(stripIdleTimer);
    stripIdleTimer = setTimeout(function() {
      stripOutputBytes = 0;
      stripJsActive = false;
      stripUpdate();
    }, 1500);
  };

  // Wrap setTheme to update glow + strip colors
  var _origSetTheme = window.termManager.setTheme.bind(window.termManager);
  window.termManager.setTheme = function(name) {
    _origSetTheme(name);
    glowUpdateAllColors();
  };
})();
</script>
</body>
</html>
