<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @property --glow-hue {
    syntax: '<number>';
    initial-value: 220;
    inherits: false;
  }
  @property --glow-intensity {
    syntax: '<number>';
    initial-value: 0.3;
    inherits: false;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent !important;
    overflow: hidden;
  }

  #capsule {
    width: 100%; height: 100%;
    position: relative;
    border-radius: 15px;
    transition: box-shadow 0.3s ease;
  }

  /* === Aurora blobs === */
  #aurora {
    position: absolute;
    inset: 0;
    border-radius: 15px;
    overflow: hidden;
    z-index: 2;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(14px);
    mix-blend-mode: screen;
    will-change: transform;
  }
  .b1 { width: 45px; height: 45px; background: rgba(100,160,255,0.9); }
  .b2 { width: 40px; height: 40px; background: rgba(170,80,245,0.85); }
  .b3 { width: 38px; height: 38px; background: rgba(40,220,190,0.85); }
  .b4 { width: 35px; height: 35px; background: rgba(240,100,180,0.7); }
  .b5 { width: 32px; height: 32px; background: rgba(130,180,255,0.8); }
  .b6 { width: 28px; height: 28px; background: rgba(200,200,255,0.5); }

  /* Vertical blobs — normal speed */
  body.vertical .b1 { animation: vy1 6s ease-in-out infinite, vx1 8s ease-in-out infinite; }
  body.vertical .b2 { animation: vy2 5s ease-in-out infinite, vx2 7s ease-in-out infinite; }
  body.vertical .b3 { animation: vy3 4.5s ease-in-out infinite, vx3 6.5s ease-in-out infinite; }
  body.vertical .b4 { animation: vy4 7s ease-in-out infinite, vx4 5.5s ease-in-out infinite; }
  body.vertical .b5 { animation: vy5 5.5s ease-in-out infinite, vx5 9s ease-in-out infinite; }
  body.vertical .b6 { animation: vy6 4s ease-in-out infinite, vx6 7.5s ease-in-out infinite; }

  /* Idle: gentle movement */
  body.vertical.idle .b1 { animation-duration: 10s, 13s; opacity: 0.6; }
  body.vertical.idle .b2 { animation-duration: 9s, 12s; opacity: 0.6; }
  body.vertical.idle .b3 { animation-duration: 8s, 11s; opacity: 0.6; }
  body.vertical.idle .b4 { animation-duration: 11s, 10s; opacity: 0.6; }
  body.vertical.idle .b5 { animation-duration: 9.5s, 14s; opacity: 0.6; }
  body.vertical.idle .b6 { animation-duration: 8s, 12.5s; opacity: 0.6; }

  /* Running: faster blobs */
  body.vertical.running .b1 { animation-duration: 3s, 4s; }
  body.vertical.running .b2 { animation-duration: 2.5s, 3.5s; }
  body.vertical.running .b3 { animation-duration: 2.2s, 3.2s; }
  body.vertical.running .b4 { animation-duration: 3.5s, 2.8s; }
  body.vertical.running .b5 { animation-duration: 2.8s, 4.5s; }
  body.vertical.running .b6 { animation-duration: 2s, 3.8s; }

  @keyframes vy1 { 0%,100% { top: -10px; } 50% { top: 65px; } }
  @keyframes vx1 { 0%,100% { left: -14px; } 50% { left: -6px; } }
  @keyframes vy2 { 0%,100% { top: 70px; } 50% { top: -8px; } }
  @keyframes vx2 { 0%,100% { left: -8px; } 50% { left: -16px; } }
  @keyframes vy3 { 0%,100% { top: 30px; } 33% { top: 75px; } 66% { top: -8px; } }
  @keyframes vx3 { 0%,100% { left: -10px; } 50% { left: -5px; } }
  @keyframes vy4 { 0%,100% { top: 50px; } 50% { top: 5px; } }
  @keyframes vx4 { 0%,100% { left: -6px; } 50% { left: -14px; } }
  @keyframes vy5 { 0%,100% { top: -5px; } 33% { top: 45px; } 66% { top: 80px; } }
  @keyframes vx5 { 0%,100% { left: -12px; } 50% { left: -4px; } }
  @keyframes vy6 { 0%,100% { top: 40px; } 50% { top: 10px; } }
  @keyframes vx6 { 0%,100% { left: -8px; } 50% { left: -10px; } }

  /* Horizontal blobs — normal speed */
  body.horizontal .b1 { animation: hy1 8s ease-in-out infinite, hx1 6s ease-in-out infinite; }
  body.horizontal .b2 { animation: hy2 7s ease-in-out infinite, hx2 5s ease-in-out infinite; }
  body.horizontal .b3 { animation: hy3 6.5s ease-in-out infinite, hx3 4.5s ease-in-out infinite; }
  body.horizontal .b4 { animation: hy4 5.5s ease-in-out infinite, hx4 7s ease-in-out infinite; }
  body.horizontal .b5 { animation: hy5 9s ease-in-out infinite, hx5 5.5s ease-in-out infinite; }
  body.horizontal .b6 { animation: hy6 7.5s ease-in-out infinite, hx6 4s ease-in-out infinite; }

  /* Idle: gentle movement */
  body.horizontal.idle .b1 { animation-duration: 13s, 10s; opacity: 0.6; }
  body.horizontal.idle .b2 { animation-duration: 12s, 9s; opacity: 0.6; }
  body.horizontal.idle .b3 { animation-duration: 11s, 8s; opacity: 0.6; }
  body.horizontal.idle .b4 { animation-duration: 10s, 11s; opacity: 0.6; }
  body.horizontal.idle .b5 { animation-duration: 14s, 9.5s; opacity: 0.6; }
  body.horizontal.idle .b6 { animation-duration: 12.5s, 8s; opacity: 0.6; }

  /* Running: faster */
  body.horizontal.running .b1 { animation-duration: 4s, 3s; }
  body.horizontal.running .b2 { animation-duration: 3.5s, 2.5s; }
  body.horizontal.running .b3 { animation-duration: 3.2s, 2.2s; }
  body.horizontal.running .b4 { animation-duration: 2.8s, 3.5s; }
  body.horizontal.running .b5 { animation-duration: 4.5s, 2.8s; }
  body.horizontal.running .b6 { animation-duration: 3.8s, 2s; }

  @keyframes hx1 { 0%,100% { left: -10px; } 50% { left: 65px; } }
  @keyframes hy1 { 0%,100% { top: -14px; } 50% { top: -6px; } }
  @keyframes hx2 { 0%,100% { left: 70px; } 50% { left: -8px; } }
  @keyframes hy2 { 0%,100% { top: -8px; } 50% { top: -16px; } }
  @keyframes hx3 { 0%,100% { left: 30px; } 33% { left: 75px; } 66% { left: -8px; } }
  @keyframes hy3 { 0%,100% { top: -10px; } 50% { top: -5px; } }
  @keyframes hx4 { 0%,100% { left: 50px; } 50% { left: 5px; } }
  @keyframes hy4 { 0%,100% { top: -6px; } 50% { top: -14px; } }
  @keyframes hx5 { 0%,100% { left: -5px; } 33% { left: 45px; } 66% { left: 80px; } }
  @keyframes hy5 { 0%,100% { top: -12px; } 50% { top: -4px; } }
  @keyframes hx6 { 0%,100% { left: 40px; } 50% { left: 10px; } }
  @keyframes hy6 { 0%,100% { top: -8px; } 50% { top: -10px; } }

  /* === Glow Pulse (Running) — @property driven === */
  #capsule.running {
    animation:
      glowPulse 2.5s ease-in-out infinite,
      glowHueShift 6s linear infinite;
  }
  @keyframes glowPulse {
    0%, 100% { --glow-intensity: 0.5; }
    50%      { --glow-intensity: 1.0; }
  }
  @keyframes glowHueShift {
    0%   { --glow-hue: 220; }
    33%  { --glow-hue: 270; }
    66%  { --glow-hue: 185; }
    100% { --glow-hue: 220; }
  }

  /* === Done flash === */
  #done-flash {
    position: absolute;
    inset: 0;
    border-radius: 15px;
    background: rgba(48, 209, 88, 0.6);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 10;
  }

  /* === Pixel Pet === */
  #pet {
    position: absolute;
    inset: 0;
    display: none;
    overflow: visible;
    z-index: 5;
  }
  #pet.vertical {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pet.horizontal {
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  #pet.vertical #pet-svg-container,
  #pet.vertical #pet-stroke-container {
    transform: rotate(-90deg);
  }
  #pet-svg-container, #pet-stroke-container {
    position: absolute;
    overflow: visible;
  }
  #pet.horizontal #pet-svg-container,
  #pet.horizontal #pet-stroke-container {
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
  }
  #pet.vertical #pet-svg-container,
  #pet.vertical #pet-stroke-container {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-90deg);
  }
  #pet img {
    image-rendering: pixelated;
  }
  #pet svg {
    overflow: visible;
  }
  /* Stroke draw animation for the antenna line */
  @keyframes drawLine {
    0% { stroke-dashoffset: 120; }
    100% { stroke-dashoffset: 0; }
  }
  #pet .antenna-line {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: drawLine 1.5s ease-out forwards;
  }
  #pet svg .draw-stroke {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: drawLine 1.5s ease-out forwards;
  }
  #pet svg .draw-stroke-slow {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: drawLine 1.5s ease-out forwards;
  }
</style>
</head>

    'done-1': '<svg width="100%" height="100%" overflow="visible" viewBox="0 0 47 25" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="30" y="13" width="9" height="12" fill="white" fill-opacity="0.5"/><rect x="39" y="13" width="8" height="12" fill="white"/><path d="M0 25C0 18.3726 5.37258 13 12 13H24V25H0V25Z" fill="white" fill-opacity="0.5"/><rect x="22" y="13" width="8" height="12" fill="white"/><rect x="22" y="18" width="8" height="2" fill="#3AD372"/><rect x="39" y="18" width="8" height="2" fill="#3AD372"/><rect x="22" y="17" width="4" height="4" fill="black"/><rect x="39" y="17" width="4" height="4" fill="black"/><path id="Vector" d="M33.0107 5.43953C33.5232 5.9407 35.1551 7.14023 36.5003 7.59818C36.7908 7.6971 37.0674 7.69838 37.3374 7.62619C39.2967 6.02068 41.9333 3.22839 42.4467 2.48401C42.6637 2.15305 42.7926 1.91706 43.06 1.11434" stroke="#3AD372" stroke-width="2" stroke-linecap="round"/></svg>',
    'done-2': '<svg width="100%" height="100%" overflow="visible" viewBox="0 0 47 25" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="30" y="13" width="9" height="12" fill="white" fill-opacity="0.5"/><rect x="39" y="13" width="8" height="12" fill="white"/><path d="M0 25C0 18.3726 5.37258 13 12 13H24V25H0V25Z" fill="white" fill-opacity="0.5"/><rect x="22" y="13" width="8" height="12" fill="white"/><rect x="22" y="17" width="8" height="4" fill="#3AD372"/><rect x="39" y="17" width="8" height="4" fill="#3AD372"/><rect x="22" y="17" width="4" height="4" fill="black"/><rect x="39" y="17" width="4" height="4" fill="black"/><path id="Vector" d="M33.0107 5.43957C33.5233 5.94074 35.1552 7.14027 36.5003 7.59821C36.7909 7.69713 37.0674 7.69842 37.3375 7.62622C39.2967 6.02072 41.9334 3.22843 42.4467 2.48405C42.6638 2.15308 42.7926 1.91709 43.0601 1.11438" stroke="#3AD372" stroke-width="2" stroke-linecap="round"/></svg>',

  };

  var petFrameKeys = {
    idle: ['idle'],
    thinking: ['thinking-1', 'thinking-2', 'thinking-3', 'thinking-4'],
    done: ['done-1', 'done-2', 'done-3', 'done-4']
  };
  var petFrameIndex = 0;

  // Force uniform viewBox 66x32 for all states
  // Content gets translated to align body bottoms at same y position
  var uniformViewBox = '0 0 66 32';

  function getTranslate(key) {
    // Align body bottom to y≈30, center horizontally in 66-wide canvas
    if (key.indexOf('thinking') === 0) return '5.8,2.06';   // body bottom 29.94 → +2.06 = 32, x: (66-54.4)/2
    if (key.indexOf('done') === 0) return '9.5,7';           // body bottom 25 → +7 = 32, x: (66-47)/2
    return '9.5,6';                                            // idle: body bottom 26 → +6 = 32
  }

  function makeSvg(inner, key) {
    var t = getTranslate(key);
    return '<svg width="55" height="30" viewBox="' + uniformViewBox + '" preserveAspectRatio="xMidYMax meet" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><rect width="66" height="32" fill="none"/><g transform="translate(' + t + ')">' + inner + '</g></svg>';
  }

  function extractInner(svgText) {
    return svgText.replace(/<svg[^>]*>/, '').replace(/<\/svg>/, '');
  }

  function showPetFrame(key, animClass) {
    var svgText = svgData[key];
    if (!svgText) return;
    petSvgContainer.innerHTML = makeSvg(extractInner(svgText), key);
    petStrokeContainer.innerHTML = '';
    if (animClass) {
      var paths = petSvgContainer.querySelectorAll('path[id^="Vector"]');
      for (var i = 0; i < paths.length; i++) {
        paths[i].classList.add(animClass);
      }
    }
  }

  function showPetBody(key) {
    var svgText = svgData[key];
    if (!svgText) return;
    var bodyOnly = svgText.replace(/<path[^>]*id="Vector[^"]*"[^/]*\/>/g, '');
    petSvgContainer.innerHTML = makeSvg(extractInner(bodyOnly), key);
  }

  function showPetStroke(key, animClass) {
    var svgText = svgData[key];
    if (!svgText) return;
    var match = svgText.match(/<path[^>]*id="Vector[^"]*"[^/]*\/>/);
    if (!match) { petStrokeContainer.innerHTML = ''; return; }
    petStrokeContainer.innerHTML = makeSvg(match[0], key);
    if (animClass) {
      var paths = petStrokeContainer.querySelectorAll('path[id^="Vector"]');
      for (var i = 0; i < paths.length; i++) {
        paths[i].classList.add(animClass);
      }
    }
  }

  function startPetAnim(state) {
    stopPetAnim();
    petState = state;
    petFrameIndex = 0;
    var keys = petFrameKeys[state] || petFrameKeys.idle;

    if (state === 'idle') {
      showPetFrame(keys[0], 'draw-stroke');
      petIdleRedrawTimer = setInterval(function() {
        showPetFrame(keys[0], 'draw-stroke');
      }, 10000);
    } else if (state === 'thinking') {
      // Body cycles fast (eyeblink), stroke draws slow independently
      showPetBody(keys[0]);
      showPetStroke(keys[0], 'draw-stroke');
      if (keys.length > 1) {
        // Body: cycle every 300ms (fast eyeblink)
        petAnimTimer = setInterval(function() {
          petFrameIndex = (petFrameIndex + 1) % keys.length;
          showPetBody(keys[petFrameIndex]);
        }, 300);
        // Stroke: redraw every full cycle (300ms * 4 frames = 1.2s, close to 1.5s draw time)
        petIdleRedrawTimer = setInterval(function() {
          showPetStroke(keys[petFrameIndex], 'draw-stroke');
        }, 1500);
      }
    } else if (state === 'done') {
      // Play 4 frames once, 2s each, then back to idle
      var doneIdx = 0;
      showPetFrame(keys[0], 'draw-stroke-slow');
      petAnimTimer = setInterval(function() {
        doneIdx++;
        if (doneIdx >= keys.length) {
          clearInterval(petAnimTimer);
          petAnimTimer = null;
          setTimeout(function() { startPetAnim('idle'); }, 2000);
          return;
        }
        showPetFrame(keys[doneIdx], 'draw-stroke-slow');
      }, 2000);
    }
  }

  function stopPetAnim() {
    if (petAnimTimer) { clearInterval(petAnimTimer); petAnimTimer = null; }
    if (petIdleRedrawTimer) { clearInterval(petIdleRedrawTimer); petIdleRedrawTimer = null; }
  }

  // Glow Pulse: read @property vars → apply box-shadow
  function updateGlow() {
    if (!isRunning) { glowRAF = null; return; }
    var cs = getComputedStyle(capsule);
    var hue = parseFloat(cs.getPropertyValue('--glow-hue')) || 220;
    var intensity = parseFloat(cs.getPropertyValue('--glow-intensity')) || 0.3;

    var c1 = 'hsla(' + hue + ',80%,70%,' + (intensity * 0.8) + ')';
    var c2 = 'hsla(' + hue + ',75%,65%,' + (intensity * 0.5) + ')';
    var c3 = 'hsla(' + hue + ',65%,60%,' + (intensity * 0.25) + ')';

    capsule.style.boxShadow = [
      '0 0 ' + (5 + intensity * 10) + 'px ' + (2 + intensity * 4) + 'px ' + c1,
      '0 0 ' + (12 + intensity * 20) + 'px ' + (5 + intensity * 8) + 'px ' + c2,
      '0 0 ' + (24 + intensity * 36) + 'px ' + (10 + intensity * 16) + 'px ' + c3,
      'inset 0 0 ' + (5 + intensity * 8) + 'px ' + (2 + intensity * 3) + 'px ' + c1
    ].join(', ');

    glowRAF = requestAnimationFrame(updateGlow);
  }

  window.auroraBridge = {
    setOrientation: function(orient) {
      // Preserve idle/running state when changing orientation
      var isRunState = document.body.classList.contains('running');
      document.body.className = orient + ' ' + (isRunState ? 'running' : 'idle');
      // Update pet orientation
      petEl.classList.remove('vertical', 'horizontal');
      petEl.classList.add(orient);
    },

    setState: function(state) {
      if (state === 'running') {
        isRunning = true;
        capsule.classList.add('running');
        capsule.classList.remove('idle');
        document.body.classList.add('running');
        document.body.classList.remove('idle');
        if (currentMode === 'aurora') {
          if (!glowRAF) glowRAF = requestAnimationFrame(updateGlow);
        } else {
          startPetAnim('thinking');
        }
      } else {
        isRunning = false;
        capsule.classList.remove('running');
        capsule.classList.add('idle');
        document.body.classList.remove('running');
        document.body.classList.add('idle');
        capsule.style.boxShadow = 'none';
        if (currentMode === 'pet') {
          startPetAnim('idle');
        }
      }
    },

    flashDone: function() {
      if (currentMode === 'aurora') {
        if (doneTimer) clearTimeout(doneTimer);
        doneFlash.style.opacity = '1';
        doneTimer = setTimeout(function() {
          doneFlash.style.opacity = '0';
          doneTimer = null;
        }, 1000);
      } else {
        // Pet done animation — play once then back to idle
        startPetAnim('done');
        setTimeout(function() {
          startPetAnim('idle');
        }, 1200);
      }
    },

    setMode: function(mode) {
      currentMode = mode;
      if (mode === 'pet') {
        auroraEl.style.display = 'none';
        petEl.style.display = 'flex';
        capsule.style.boxShadow = 'none';
        startPetAnim(isRunning ? 'thinking' : 'idle');
      } else {
        auroraEl.style.display = '';
        petEl.style.display = 'none';
        stopPetAnim();
        if (isRunning && !glowRAF) glowRAF = requestAnimationFrame(updateGlow);
      }
    },

    pause: function() {
      document.body.style.animationPlayState = 'paused';
      var blobs = document.querySelectorAll('.blob');
      for (var i = 0; i < blobs.length; i++) blobs[i].style.animationPlayState = 'paused';
      if (isRunning) { isRunning = false; capsule.style.boxShadow = 'none'; }
    },

    resume: function() {
      document.body.style.animationPlayState = '';
      var blobs = document.querySelectorAll('.blob');
      for (var i = 0; i < blobs.length; i++) blobs[i].style.animationPlayState = '';
    }
  };
})();
</script>
